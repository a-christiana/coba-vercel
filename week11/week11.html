<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping</title>
    <link href="week11.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-blue-50">
    <div class="sticky top-0 z-10 justify-between p-4 md:p-6 lg:p-8 backdrop-blur-md">
        <h1 class="font-heading" style="font-weight: bold;">Sepatu Sneakers</h1><br>
        <h2>Rp 250.000</h2>
        <button id="addToCartButton">Add to Cart</button>
        <h2>Ditambahkan: </h2>
    </div>

    <div class="grid m-4 md:m-6 lg:m-8 gap-4 md:gap-6 lg:gap-8">
        <p id="contactCount"></p>
        <div id="contactList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4 break-all"></div>
    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <button id="closeModal" class="close-button">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <h2 id="modalTitle" class="font-heading text-lg md:text-xl">Tambah Kontak</h2>
            <form id="contactForm">
                <input type="hidden" id="contactId" />
                <div class="form-group">
                    <label for="name">Nama</label>
                    <input type="text" id="name" name="name" placeholder="Probo Krishnacahya" required />
                </div>
                <div class="form-group">
                    <label for="phone">Nomor telepon</label>
                    <input type="tel" id="phone" name="phone" placeholder="085190055343" required />
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="probo.krishnacahya@gmail.com" required />
                </div>
                <button type="submit">Simpan</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
